



<mat-tab-group>
  <mat-tab label="Game">
  <app-appli-card *ngFor="let app of games"

                  [url]="app.url"
                  [title]="app.title"
                  [description]="app.description"
                  [subtitle]="app.subtitle"
                  [image]="app.image"></app-appli-card>
</mat-tab>
  <mat-tab label="Divers">
    <app-appli-card *ngFor="let app of divers"
                    [url]="app.url"
                    [title]="app.title"
                    [description]="app.description"
                    [subtitle]="app.subtitle"
                    [image]="app.image"></app-appli-card>
  </mat-tab>
</mat-tab-group>
