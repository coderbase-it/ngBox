



<mat-tab-group>
  <mat-tab label="Game">
    <app-appli-card *ngFor="let app of applis"
                    [modulePath]="app.modulePath"
                    [path]="app.path"
                    [url]="app.url"
                    [title]="app.title"
                    [description]="app.description"
                    [subtitle]="app.subtitle"
                    [image]="app.image"></app-appli-card>
  </mat-tab>
</mat-tab-group>
