
  <form [formGroup]="todoForm" (ngSubmit)="onSubmit()" class="example-form">


    <mat-form-field class="example-full-width">
      <input matInput formControlName="userId" placeholder="User Id" type="number">
      <div
        *ngIf="todoForm.controls['userId'].invalid && (todoForm.controls['userId'].dirty || todoForm.controls['userId'].touched)"
        class="alert alert-danger">
        <div *ngIf="todoForm.controls['userId'].errors.required">
          User Id is required.
        </div>
      </div>
    </mat-form-field>

    <mat-form-field class="example-full-width">
      <textarea matInput formControlName="title" placeholder="Title"></textarea>
      <div
        *ngIf="todoForm.controls['title'].invalid && (todoForm.controls['title'].dirty || todoForm.controls['title'].touched)"
        class="alert alert-danger">
        <div *ngIf="todoForm.controls['title'].errors.required">
          Title is required.
        </div>
      </div>
    </mat-form-field>


    <button class="btn btn-primary" (click)="clearForm()">Clear</button>
    <button type="submit"
            class="btn btn-primary mr-1"
            [disabled]="todoForm.pristine || todoForm.invalid">Submit
    </button>
  </form>
